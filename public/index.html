<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>wilzamguerrero</title>
  <link rel='shortcut icon' type='image/x-icon' href='favicon.svg' />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- CSS Principal -->
  <link rel="stylesheet" href="style.css" />

  <!-- LightGallery CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" />

  <!-- jsTree CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/themes/default-dark/style.min.css" />
  
  <!-- Highlight.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
</head>
<body>

  <canvas id="neuro"></canvas>

  <!-- PESTAÑA DE TOGGLE (siempre visible) -->
  <button id="sidebarTab" class="sidebar-tab">
    <svg class="sidebar-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <!-- SIDEBAR PANEL -->
  <aside id="sidebar" class="sidebar">
    <!-- Header del sidebar -->
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="img/logo.gif" alt="Logo" id="sidebarLogo">
      </div>
      <span class="sidebar-title">wilzamguerrero</span>
    </div>

    <!-- Botón de Upload -->
    <div class="sidebar-section">
      <button id="openUploadBtn" class="sidebar-btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Subir Archivos</span>
      </button>
    </div>

    <!-- Controles -->
    <div class="sidebar-section">
      <div class="sidebar-controls-grid">
        <button id="toggleColumnBtn" class="sidebar-control-btn" title="Columnas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Columnas</span>
        </button>
        
        <button id="toggleFullscreenBtn" class="sidebar-control-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <span>Fullscreen</span>
        </button>
        
        <button id="toggleNeuroAnim" class="sidebar-control-btn" title="Animación">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Animación</span>
        </button>
        
        <button id="backToToporbottom" class="sidebar-control-btn" title="Scroll">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 11 12 6 7 11"/>
            <polyline points="17 18 12 13 7 18"/>
          </svg>
          <span>Scroll</span>
        </button>
      </div>

      <!-- Opciones de columnas (desplegable) -->
      <div id="columnOptions" class="column-options-dropdown hidden">
        <button class="column-opt" data-columns="1">1</button>
        <button class="column-opt" data-columns="2">2</button>
        <button class="column-opt" data-columns="3">3</button>
        <button class="column-opt" data-columns="4">4</button>
        <button class="column-opt" data-columns="5">5</button>
        <button class="column-opt" data-columns="6">6</button>
      </div>
    </div>

    <!-- Separador -->
    <div class="sidebar-divider"></div>

    <!-- Título de sección: Carpetas -->
    <div class="sidebar-section-header">
      <span>CARPETAS</span>
    </div>

    <!-- Árbol de navegación -->
    <div class="sidebar-tree-wrapper">
      <div id="customTree" class="sidebar-tree"></div>
    </div>

    <!-- Footer del sidebar -->
    <div class="sidebar-footer">
      <button id="logoutBtn" class="sidebar-logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Título del nivel actual -->
  <div id="currentLevelTitle" class="current-level-title hidden">Nivel actual</div>

  <!-- Galería principal -->
  <div id="gallery" class="gallery-with-sidebar"></div>

  <!-- Logo central (se oculta cuando hay contenido) -->
  <div class="container_logo">
    <nav>
      <img src="img/logo.gif" alt="Logo" id="logo">
    </nav>
  </div>

  <!-- Modal de Upload -->
  <div id="uploadModal" class="upload-modal hidden">
    <div class="upload-modal-overlay"></div>
    <div class="upload-modal-content">
      <!-- Header -->
      <div class="upload-modal-header">
        <div>
          <h2>Subir Archivos</h2>
          <p>Sube imágenes o videos a un toggle de Notion</p>
        </div>
        <button id="closeUploadModal" class="upload-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="upload-modal-body">
        <!-- Selección de destino -->
        <div class="upload-form-group">
          <label>Seleccionar carpeta destino:</label>
          <div class="upload-destination-row">
            <select id="uploadDestination" class="upload-select">
              <option value="">Cargando carpetas...</option>
            </select>
            <button id="createNewToggle" class="upload-btn-secondary" title="Crear nueva carpeta">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Input para nueva carpeta -->
        <div id="newToggleInput" class="upload-new-toggle hidden">
          <input type="text" id="newToggleName" placeholder="Nombre de la nueva carpeta..." class="upload-input" />
          <div class="upload-new-toggle-actions">
            <button id="confirmNewToggle" class="upload-btn-confirm">Crear</button>
            <button id="cancelNewToggle" class="upload-btn-cancel">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="upload-tabs">
          <button class="upload-tab active" data-tab="file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Archivos
          </button>
          <button class="upload-tab" data-tab="url">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            URL
          </button>
        </div>

        <!-- Tab: Archivos -->
        <div id="tabFile" class="upload-tab-content active">
          <label class="upload-dropzone" id="uploadDropzone">
            <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden />
            <div class="upload-dropzone-content">
              <div class="upload-dropzone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <p>Arrastra archivos aquí o haz clic para seleccionar</p>
              <span class="upload-dropzone-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                También puedes pegar (Ctrl+V)
              </span>
            </div>
          </label>

          <!-- Preview de archivos -->
          <div id="filePreviewGrid" class="upload-preview-grid"></div>
        </div>

        <!-- Tab: URL -->
        <div id="tabUrl" class="upload-tab-content hidden">
          <div class="upload-form-group">
            <label>URL de imagen o video:</label>
            <div class="upload-url-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              <input type="url" id="urlInput" class="upload-input" placeholder="https://..." />
            </div>
          </div>
        </div>

        <!-- Caption -->
        <div class="upload-form-group">
          <label>Descripción (opcional):</label>
          <input type="text" id="uploadCaption" class="upload-input" placeholder="Añadir una descripción..." />
        </div>
      </div>

      <!-- Footer -->
      <div class="upload-modal-footer">
        <!-- Progress -->
        <div id="uploadProgress" class="upload-progress hidden">
          <div class="upload-progress-bar">
            <div class="upload-progress-fill"></div>
          </div>
          <span class="upload-progress-text">Subiendo 0/0...</span>
        </div>
        <button id="submitUpload" class="upload-submit-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Subir</span>
        </button>
      </div>

      <!-- Success overlay -->
      <div id="uploadSuccess" class="upload-success hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h3>¡Subida completada!</h3>
      </div>
    </div>
  </div>

  <!-- Modal de texto -->
  <div id="textModal" class="text-modal">
    <div class="text-modal-header">
      <div class="text-modal-nav">
        <button id="prevTextBtn" disabled>&laquo; Anterior</button>
        <button id="nextTextBtn" disabled>Siguiente &raquo;</button>
      </div>
      <span class="text-modal-close">&times;</span>
    </div>
    <div class="text-modal-content">
      <div id="textModalContent"></div>
    </div>
  </div>

  <!-- Librerías externas -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.12/dist/jstree.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/macy@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/zoom/lg-zoom.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/autoplay/lg-autoplay.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/fullscreen/lg-fullscreen.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/thumbnail/lg-thumbnail.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/rotate/lg-rotate.umd.min.js"></script>
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

  <!-- Scripts de la aplicación -->
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
